name: Bug Report
description: Report a bug in the forgepass-contracts codebase
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run command...
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include the full error output.
    validations:
      required: true

  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: Output of `rustc --version`
      placeholder: rustc 1.xx.x (xxxxxxx YYYY-MM-DD)
    validations:
      required: true

  - type: input
    id: soroban-cli-version
    attributes:
      label: Soroban CLI Version
      description: Output of `soroban --version`
      placeholder: soroban x.x.x
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which Stellar network were you using?
      options:
        - testnet
        - mainnet
        - local
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.

      - type: markdown
    attributes:
      value: |
        ## Board Fields

        After opening this issue, set the following on the [ForgePass Development Board](https://github.com/orgs/forgepass-xyz/projects/2):

        - **Phase**: (Phase 0 through Phase 5, or Roadmap)
        - **Effort**: (S / M / L / XL)
        - **Repo**: (contracts / core-api / core-web / org / sdk)
        - **Epic**: (e.g. "Epic 3: Backend API")

        ## Depends on

        List any issues this one depends on. Use the full cross-repo form (`forgepass-xyz/<repo>#<number>`) for issues in a different repository. See [CONTRIBUTING.md](../../CONTRIBUTING.md#cross-repo-issue-linking-convention).